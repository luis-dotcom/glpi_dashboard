{% extends 'base.html' %}

{% block title %}Desempenho{% endblock %}
{% block page_key %}desempenho{% endblock %}
{% block current_page %}desempenho{% endblock %}

{% block page_data %}
<script id="page-data" type="application/json">
{
    "selectedYear": {{ selected_year|default:0 }},
    "availableYears": [
        {% for ano in available_years %}{{ ano }}{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "totalCapturedYear": {{ total_captured_year|default:0 }},
    "totalResolvedYear": {{ total_resolved_year|default:0 }},
    "currentBacklog": {{ current_backlog|default:0 }},
    "chartLabels": [
        {% for label in chart_labels %}"{{ label|escapejs }}"{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "chartCaptured": [
        {% for value in chart_captured %}{{ value|default:0 }}{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "chartResolved": [
        {% for value in chart_resolved %}{{ value|default:0 }}{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "chartBacklog": [
        {% for value in chart_backlog %}{{ value|default:0 }}{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "chartResolutionRate": [
        {% for value in chart_resolution_rate %}{{ value|default:0 }}{% if not forloop.last %},{% endif %}{% endfor %}
    ],
    "historyRows": [
        {% for item in history_rows %}
        {
            "mes": "{{ item.mes|escapejs }}",
            "capturados": {{ item.capturados|default:0 }},
            "resolvidos": {{ item.resolvidos|default:0 }},
            "backlog": {{ item.backlog|default:0 }},
            "taxaResolucao": {{ item.taxa_resolucao|default:0 }}
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
}
</script>
{% endblock %}
