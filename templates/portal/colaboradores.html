{% extends 'base.html' %}

{% block title %}Colaboradores{% endblock %}
{% block page_key %}colaboradores{% endblock %}
{% block current_page %}colaboradores{% endblock %}

{% block page_data %}
<script id="page-data" type="application/json">
{
    "dataInicio": "{{ data_inicio|default:''|escapejs }}",
    "dataFim": "{{ data_fim|default:''|escapejs }}",
    "ranking": [
        {% for item in ranking %}
        {
            "nome": "{{ item.nome|escapejs }}",
            "total": {{ item.total|default:0 }},
            "atribuidos": {{ item.atribuidos|default:0 }},
            "pendentes": {{ item.pendentes|default:0 }},
            "resolvidos": {{ item.resolvidos|default:0 }},
            "fechados": {{ item.fechados|default:0 }},
            "backlog": {{ item.backlog|default:0 }}
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
}
</script>
{% endblock %}
