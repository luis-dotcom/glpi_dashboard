{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'frontend/assets/app.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="login">
    <div id="react-login-root"></div>

    <script id="login-data" type="application/json">
    {
        "csrfToken": "{{ csrf_token }}",
        "usernameValue": "{{ form.username.value|default:''|escapejs }}",
        "passwordValue": "{{ form.password.value|default:''|escapejs }}",
        "usernameError": "{% if form.username.errors %}{{ form.username.errors.0|escapejs }}{% endif %}",
        "passwordError": "{% if form.password.errors %}{{ form.password.errors.0|escapejs }}{% endif %}",
        "messages": [
            {% if messages %}
                {% for message in messages %}
                    "{{ message|escapejs }}"{% if not forloop.last %},{% endif %}
                {% endfor %}
            {% endif %}
        ]
    }
    </script>

    <script type="module" src="{% static 'frontend/assets/app.js' %}" defer></script>
</body>
</html>
