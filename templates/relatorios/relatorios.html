{% extends 'base.html' %}

{% block title %}Relatorios{% endblock %}
{% block page_key %}relatorios{% endblock %}
{% block current_page %}relatorios{% endblock %}

{% block page_data %}
<script id="page-data" type="application/json">
{
    "baseUrl": "{% url 'relatorios' %}",
    "currentQuery": "{{ request.GET.urlencode|escapejs }}",
    "pdfUnavailable": {% if pdf_unavailable %}true{% else %}false{% endif %},
    "filters": {
        "dataInicio": "{{ request.GET.data_inicio|default:''|escapejs }}",
        "dataFim": "{{ request.GET.data_fim|default:''|escapejs }}",
        "tecnico": "{{ request.GET.tecnico|default:''|escapejs }}",
        "grupo": "{{ request.GET.grupo|default:''|escapejs }}",
        "localizacao": "{{ request.GET.localizacao|default:''|escapejs }}",
        "categoria": "{{ request.GET.categoria|default:''|escapejs }}"
    },
    "tecnicos": [
        {% for item in tecnicos %}
        {
            "id": "{{ item.id|escapejs }}",
            "name": "{{ item.name|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    "grupos": [
        {% for item in grupos %}
        {
            "id": "{{ item.id|escapejs }}",
            "name": "{{ item.name|default:'-'|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    "localizacoes": [
        {% for item in localizacoes %}
        {
            "id": "{{ item.id|escapejs }}",
            "name": "{{ item.name|default:'-'|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    "categorias": [
        {% for item in categorias %}
        {
            "id": "{{ item.id|escapejs }}",
            "name": "{{ item.completename|default:item.name|default:'-'|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    "totalChamados": {{ total_chamados|default:0 }},
    "chamadosFechados": {{ chamados_fechados|default:0 }},
    "chamadosAbertos": {{ chamados_abertos|default:0 }},
    "totalTecnicos": {{ total_tecnicos|default:0 }},
    "totalGrupos": {{ total_grupos|default:0 }},
    "chamados": [
        {% for chamado in chamados %}
        {
            "id": "{{ chamado.id|default:'-'|escapejs }}",
            "titulo": "{{ chamado.titulo|default:'-'|escapejs }}",
            "tecnico": "{{ chamado.tecnico|default:'-'|escapejs }}",
            "grupo": "{{ chamado.grupo|default:'-'|escapejs }}",
            "localizacao": "{{ chamado.localizacao|default:'-'|escapejs }}",
            "categoria": "{{ chamado.categoria|default:'-'|escapejs }}",
            "status": "{{ chamado.status|default:'-'|escapejs }}",
            "dataAbertura": "{{ chamado.data_abertura|default:'-'|escapejs }}",
            "dataFechamento": "{{ chamado.data_fechamento|default:'-'|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
}
</script>
{% endblock %}
