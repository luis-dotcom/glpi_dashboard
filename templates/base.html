{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'frontend/assets/app.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body data-page="{% block page_key %}{% endblock %}">
    <div id="react-root"></div>

    <script id="layout-data" type="application/json">
    {
        "glpiName": "{{ glpi_name|default:request.user.username|escapejs }}",
        "glpiProfile": "{{ glpi_profile|default:'Sem perfil'|escapejs }}",
        "glpiPicture": "{{ request.session.glpi_picture|default:''|escapejs }}",
        "currentPage": "{% block current_page %}{% endblock %}",
        "permissions": {
            "canDesempenho": {% if request.session.glpi_profile == 'Technician' or request.session.glpi_profile == 'Supervisor' or request.session.glpi_profile == 'Super-Admin' %}true{% else %}false{% endif %},
            "canColaboradores": {% if request.session.glpi_profile == 'Supervisor' or request.session.glpi_profile == 'Super-Admin' %}true{% else %}false{% endif %},
            "canRelatorios": {% if request.session.glpi_profile == 'Supervisor' or request.session.glpi_profile == 'Super-Admin' %}true{% else %}false{% endif %}
        },
        "urls": {
            "home": "{% url 'home' %}",
            "desempenho": "{% url 'desempenho' %}",
            "colaboradores": "{% url 'colaboradores' %}",
            "relatorios": "{% url 'relatorios' %}",
            "logout": "{% url 'logout' %}"
        }
    }
    </script>

    {% block page_data %}{% endblock %}

    <script type="module" src="{% static 'frontend/assets/app.js' %}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
